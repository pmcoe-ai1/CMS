# ─────────────────────────────────────────────────────────────────────────────
# CANONICAL MODEL — starter (cms)
# Schema version: v3.0.0
# Meta version:   1.0.0
# Domain: cms
#
# This is a minimal starter model generated by `fabric init`.
# It defines a single Task entity with a lifecycle, one rule, one scenario,
# and one operation. Use it as a starting point — extend with your own
# entities, rules, and operations.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  id: "00000000-0000-0000-0000-000000000001"
  version: "1.0.0"
  status: draft
  createdAt: "2026-03-08T00:00:00Z"
  description: "cms domain — minimal starter model generated by fabric init."
  domain: "cms"
  owners: []
  prevHash: null
  changeReason: null

# ─────────────────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────────────────

glossary:

  - id: task
    term: Task
    definition: >
      A unit of work to be completed. Has a title, description, and status
      that tracks its progress through a lifecycle.
    examples:
      - "User creates a task to review the quarterly report"
    precision:
      type: enum
      values: [pending, in-progress, done]
    conceptVersion: "1.0"

  - id: task-title
    term: Task Title
    definition: A short summary of the task. Required on creation.
    precision:
      type: range
      min: 1
      max: 255
    conceptVersion: "1.0"

# ─────────────────────────────────────────────────────────────────────────────
# INTENTS
# ─────────────────────────────────────────────────────────────────────────────

intents:

  - id: manage-tasks
    name: Manage Tasks
    description: >
      Allow users to create, update, and track tasks through their lifecycle.
    status: draft
    version: "1.0"
    priority: must
    glossaryRefs: [task, task-title]

# ─────────────────────────────────────────────────────────────────────────────
# SCENARIOS
# ─────────────────────────────────────────────────────────────────────────────

scenarios:

  - id: task-marked-done
    intentRef: manage-tasks
    name: Task marked as done
    given: "A task exists with status in-progress"
    when: "The user marks the task as done"
    then: "The task status transitions to done and updatedAt is refreshed"
    coverageType: happy
    expectedResult: true
    entityRefs: [task]
    ruleRefs: [mark-task-done]
    fieldRefs:
      - entityId: task
        fieldId: status
        value: "in-progress"
    outputFieldRefs:
      - entityId: task
        fieldId: status
        value: "done"

  - id: task-not-already-done
    intentRef: manage-tasks
    name: Task already done cannot be re-completed
    given: "A task exists with status done"
    when: "The user attempts to mark the task as done again"
    then: "The rule condition is false — task is already done"
    coverageType: edge
    expectedResult: false
    entityRefs: [task]
    ruleRefs: [mark-task-done]
    fieldRefs:
      - entityId: task
        fieldId: status
        value: "done"

# ─────────────────────────────────────────────────────────────────────────────
# ENTITIES
# ─────────────────────────────────────────────────────────────────────────────

entities:

  - id: task
    name: Task
    glossaryRef: task
    description: "A unit of work tracked through a lifecycle."
    fields:
      - id: id
        name: id
        type: uuid
        systemField: true
        immutable: true
        description: "Unique identifier for the task"
      - id: title
        name: title
        type: string
        required: true
        glossaryRef: task-title
        description: "Short summary of the task"
        validation:
          minLength: 1
          maxLength: 255
      - id: description
        name: description
        type: string
        nullable: true
        description: "Detailed description of the task"
      - id: status
        name: status
        type: enum
        enumValues: [pending, in-progress, done]
        required: true
        glossaryRef: task
        description: "Current lifecycle state of the task"
      - id: created-at
        name: createdAt
        type: datetime
        systemField: true
        immutable: true
        description: "Timestamp when the task was created"
      - id: updated-at
        name: updatedAt
        type: datetime
        systemField: true
        description: "Timestamp when the task was last updated"
    lifecycle:
      statusField: status
      initialState: pending
      terminalStates: [done]
      transitions:
        - from: pending
          to: in-progress
          trigger: start-task
          description: "User starts working on the task"
        - from: in-progress
          to: done
          trigger: mark-task-done
          description: "User completes the task"
        - from: in-progress
          to: pending
          trigger: pause-task
          description: "User pauses the task"
    indexes:
      - fields: [status]
      - fields: [createdAt]

# ─────────────────────────────────────────────────────────────────────────────
# EVENTS
# ─────────────────────────────────────────────────────────────────────────────

events:

  - id: task.completed
    name: Task Completed
    entityRef: task
    description: "Emitted when a task transitions to done status."
    payloadFields: [id, title, status]
    intentRef: manage-tasks

# ─────────────────────────────────────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────────────────────────────────────

rules:

  - id: mark-task-done
    name: Mark Task Done
    description: >
      When a task is in-progress, transition it to done and emit a completion event.
    intentRef: manage-tasks
    entityRef: task
    scenarioRefs: [task-marked-done, task-not-already-done]
    condition:
      field: status
      operator: eq
      value: "in-progress"
    action:
      type: set
      field: status
      value: "done"
      then:
        - type: emit-event
          event: task.completed

# ─────────────────────────────────────────────────────────────────────────────
# OPERATIONS
# ─────────────────────────────────────────────────────────────────────────────

operations:

  - id: create-task
    name: Create Task
    description: "Create a new task in pending status."
    method: POST
    path: /tasks
    inputMode: body
    inputEntity: task
    outputMode: single
    outputEntity: task
    intentRef: manage-tasks
    errorResponses:
      - statusCode: 400
        code: VALIDATION_ERROR
        description: "Task title is missing or invalid"

  - id: list-tasks
    name: List Tasks
    description: "List all tasks with optional status filter."
    method: GET
    path: /tasks
    inputMode: query
    inputEntity: task
    outputMode: collection
    outputEntity: task
    intentRef: manage-tasks
    pagination:
      strategy: cursor
      defaultSize: 20
      maxSize: 100
