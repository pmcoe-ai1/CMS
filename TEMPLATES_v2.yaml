# ═══════════════════════════════════════════════════════════════
# DOCUMENT 8: OBJECT SERVICE TEMPLATE
# ═══════════════════════════════════════════════════════════════
#
# Full-Stack Coding Agent copies this template when building a new object service.
# The template enforces all architecture rules from ARCHITECTURE.md.
#
# File structure for a new service:
#
#   api/services/{service-name}/
#   ├── index.js          ← Main service (copy from below)
#   ├── errors.js         ← Service-specific error classes
#   └── __tests__/
#       └── index.test.js ← Unit tests (copy from test template)
#
# After creating the service, Full-Stack Coding Agent must:
#   1. Add the service to SERVICE_REGISTRY.yaml
#   2. Create contract tests (Document 12 template)
#   3. Run Full-Stack Coding Agent's validation checklist
# ═══════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────
# FILE: api/services/{service-name}/index.js
# ─────────────────────────────────────────────────────────────
# /**
#  * {ServiceName}Service
#  *
#  * {One-line description of what this service does}
#  *
#  * Published Interface (see SERVICE_REGISTRY.yaml):
#  *   - {operationName}: {brief description}
#  *
#  * Architecture Rules:
#  *   - This service is GENERIC — no application-specific logic
#  *   - All inputs come through the published interface
#  *   - All errors are typed (see errors.js)
#  *   - No direct imports from other services
#  *   - Dependencies are declared in the registry
#  */
#
# const { ServiceError } = require('../../errors/ServiceError');
# const { {ErrorName} } = require('./errors');
#
# class {ServiceName}Service {
#   /**
#    * @param {Object} deps - Injected dependencies
#    * @param {Object} deps.db - Database pool
#    * @param {Object} [deps.logger] - Logger instance
#    */
#   constructor(deps = {}) {
#     this.db = deps.db;
#     this.logger = deps.logger || console;
#   }
#
#   /**
#    * {operationName}
#    *
#    * {Description matching SERVICE_REGISTRY.yaml}
#    *
#    * @param {Object} input - Validated input per registry schema
#    * @param {string} input.{fieldName} - {description}
#    * @returns {Promise<Object>} Output per registry schema
#    * @throws {{ErrorName}} When {condition}
#    */
#   async {operationName}(input) {
#     // 1. Validate required inputs
#     if (!input.{requiredField}) {
#       throw new {ErrorName}('{MISSING_FIELD}', '{field} is required');
#     }
#
#     // 2. Execute the operation
#     //    - Database queries go here
#     //    - External API calls go here
#     //    - Business logic does NOT go here (it belongs in definitions)
#
#     // 3. Return output matching registry schema
#     return {
#       // Every field documented in SERVICE_REGISTRY.yaml
#     };
#   }
# }
#
# module.exports = { {ServiceName}Service };


# ─────────────────────────────────────────────────────────────
# FILE: api/services/{service-name}/errors.js
# ─────────────────────────────────────────────────────────────
# const { ServiceError } = require('../../errors/ServiceError');
#
# /**
#  * {SERVICE_NAME} errors
#  *
#  * Every error code must:
#  *   - Be UPPER_SNAKE_CASE
#  *   - Be unique within this service
#  *   - Match SERVICE_REGISTRY.yaml exactly
#  *   - Include a human-readable message
#  */
#
# class {ErrorName} extends ServiceError {
#   constructor(code, message, details = {}) {
#     super(code, message, '{ServiceName}Service', details);
#   }
# }
#
# // Error codes — must match SERVICE_REGISTRY.yaml
# const ERROR_CODES = {
#   {ERROR_CODE_1}: '{ERROR_CODE_1}',
#   {ERROR_CODE_2}: '{ERROR_CODE_2}',
# };
#
# module.exports = { {ErrorName}, ERROR_CODES };


