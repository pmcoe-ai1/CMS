# DOCUMENT 12: CONTRACT TEST TEMPLATE
# ═══════════════════════════════════════════════════════════════
#
# Contract tests verify that a service's IMPLEMENTATION matches
# its PUBLISHED INTERFACE in SERVICE_REGISTRY.yaml. Full-Stack Coding Agent
# generates these automatically from the registry.
#
# If a contract test fails, either:
#   a) The implementation is wrong (fix the code), or
#   b) The registry is wrong (fix the registry + get approval)
#
# Contract tests are the primary enforcement mechanism for
# architecture standard STD-003 (services registered).
# ═══════════════════════════════════════════════════════════════


