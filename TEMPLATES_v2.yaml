# ─────────────────────────────────────────────────────────────
# TEMPLATE A: Minimal Definition
# ─────────────────────────────────────────────────────────────
# ---
# name: my-workflow                     # lowercase-hyphenated, unique
# version: "1.0.0"                      # semver
# description: "What this workflow does"
#
# trigger:
#   type: api_event                     # api_event | schedule | webhook | manual
#   event: my.event.name                # Event name for api_event triggers
#   expected_data:                      # Optional: document expected input
#     email: { type: string, required: true }
#     amount: { type: integer, required: false }
#
# steps:
#   - id: do_something                  # unique within definition
#     type: service_call                # service_call | condition | wait | for_each
#     service: EmailService             # Must exist in SERVICE_REGISTRY.yaml
#     operation: send                   # Must exist in service's operations
#     input:                            # Map to service input schema
#       to: "{{trigger.email}}"         # Variable reference
#       subject: "Static value"         # Literal value
#     output_as: result                 # Store output as steps.result.*


