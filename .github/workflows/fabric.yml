# ─────────────────────────────────────────────────────────────────────────────
# FABRIC CI Pipeline — generated by fabric init
#
# Pipeline: validate → template-gen → gate → codegen → tsc → jest
# Edit model paths below if you rename your canonical model.
# ─────────────────────────────────────────────────────────────────────────────
name: FABRIC Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: '20'

jobs:
  pipeline:
    name: FABRIC Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # ── Stage 1: Validate canonical model ─────────────────────────────
      - name: Validate
        run: npx fabric validate models/cms.canonical-model.yaml

      # ── Stage 2: Template Generator ────────────────────────────────────
      - name: Template Generator
        run: npx fabric template-gen models/cms.canonical-model.yaml --output-dir ./templates

      # ── Stage 3: Gate (model-level checks) ─────────────────────────────
      - name: Gate
        run: npx fabric gate --model models/cms.canonical-model.yaml

      # ── Stage 4: Codegen ───────────────────────────────────────────────
      - name: Codegen
        run: npx fabric codegen models/cms.canonical-model.yaml

      # ── Stage 5: TypeScript ────────────────────────────────────────────
      - name: TypeScript
        run: npx tsc --noEmit

      # ── Stage 6: Tests ─────────────────────────────────────────────────
      - name: Tests
        run: npx jest --ci --forceExit
